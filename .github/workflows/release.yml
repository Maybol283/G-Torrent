name: Release

# Triggered only when you push a tag starting with "v" (e.g. v0.2.0).
# Ordinary commits to main do nothing — this workflow is dormant until tagged.
on:
  push:
    tags:
      - 'v*'

# Permissions granted to the GITHUB_TOKEN that every workflow run gets.
# We need "contents: write" so the release-upload action can create the
# Release and attach assets. Default is read-only.
permissions:
  contents: write

jobs:
  windows:
    name: Build Windows binary
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # uses whatever version go.mod declares

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Build .exe
        run: wails build -platform windows/amd64

      - name: Zip the .exe
        shell: pwsh
        run: Compress-Archive -Path build/bin/G-Torrent.exe -DestinationPath build/bin/G-Torrent-windows.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/G-Torrent-windows.zip

  macos:
    name: Build macOS .app
    runs-on: macos-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: "Build .app (universal: arm64 + amd64)"
        run: wails build -platform darwin/universal

      - name: Zip the .app with ditto (preserves macOS metadata)
        run: ditto -c -k --sequesterRsrc --keepParent build/bin/G-Torrent.app build/bin/G-Torrent-macos.zip

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/G-Torrent-macos.zip
